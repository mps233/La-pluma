services:
  la-pluma:
    # 使用 Docker Hub 预构建镜像（推荐）
    image: miaona/la-pluma:latest
    
    # 或者本地构建（如果需要修改代码）
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    
    container_name: la-pluma
    volumes:
      # 持久化用户配置和数据
      - /vol1/1000/la-pluma/data:/app/server/data
      # 持久化 MAA 配置目录（任务、profiles 等）
      - /vol1/1000/la-pluma/config:/root/.config/maa
      # 持久化 MAA 数据目录（MaaCore、资源文件等）
      - /vol1/1000/la-pluma/maacore:/root/.local/share/maa
    environment:
      - NODE_ENV=production
      - PORT=3000  # 容器内监听 3000 端口
      # ADB 设备地址（bridge 模式下使用宿主机 IP）
      - ADB_ADDRESS=192.168.50.103:16384
      # 可选：设置后所有 /api/* 请求需要携带 Bearer Token 或 X-La-Pluma-Token
      # - LA_PLUMA_TOKEN=change-me
      # 可选：实时日志内存缓存上限，默认 5000 行
      # - LA_PLUMA_MAX_REALTIME_LOGS=5000
    
    # 使用 bridge 网络模式
    ports:
      - "3055:3000"  # 宿主机 3055 映射到容器 3000
    
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
