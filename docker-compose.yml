services:
  la-pluma:
    # 使用 Docker Hub 预构建镜像（推荐）
    image: miaona/la-pluma:latest
    
    # 或者本地构建（如果需要修改代码）
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    
    container_name: la-pluma
    volumes:
      # 持久化用户配置和数据
      - /vol1/1000/la-pluma/data:/app/server/data
      # 持久化 MAA 配置目录（任务、profiles 等）
      - /vol1/1000/la-pluma/config:/root/.config/maa
      # 持久化 MAA 数据目录（MaaCore、资源文件等）
      - /vol1/1000/la-pluma/maacore:/root/.local/share/maa
      # 可选：HTTPS 证书目录，只读挂载
      # - /path/to/certs:/app/certs:ro
    environment:
      - NODE_ENV=production
      - PORT=3000  # 容器内监听 3000 端口
      # 自定义镜像若使用 VITE_BASE_PATH 构建，运行路径会自动匹配；手动覆盖时两者需一致
      # - LA_PLUMA_BASE_PATH=/la-pluma/
      # ADB 设备地址（bridge 模式下使用宿主机 IP）
      - ADB_ADDRESS=192.168.50.103:16384
      # 可选：保护 /api/* 与 WebRTC 同源网关票据入口
      # - LA_PLUMA_TOKEN=change-me
      # 可选：实时日志内存缓存上限，默认 5000 行
      # - LA_PLUMA_MAX_REALTIME_LOGS=5000
      # 可选：手机安装 PWA 时使用可信 HTTPS，证书与私钥必须同时配置
      # - LA_PLUMA_HTTPS_CERT_PATH=/app/certs/fullchain.pem
      # - LA_PLUMA_HTTPS_KEY_PATH=/app/certs/privkey.pem
    
    # 使用 bridge 网络模式
    ports:
      - "3055:3000"  # 宿主机 3055 映射到容器 3000
    
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "scheme=http; if [ -n \"$$LA_PLUMA_HTTPS_CERT_PATH\" ]; then scheme=https; fi; curl -fk \"$$scheme://localhost:$${PORT:-3000}/health\""]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
